<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UnityMentor Hub</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=block" rel="stylesheet">
    <script>
        document.documentElement.classList.add('fonts-loading');

        const markFontsLoaded = () => {
            document.documentElement.classList.remove('fonts-loading');
            document.documentElement.classList.add('fonts-loaded');
        };

        // Fallback timeout prevents icons staying hidden if font network fails.
        const fontLoadTimeout = setTimeout(markFontsLoaded, 3000);

        if (document.fonts && document.fonts.ready) {
            document.fonts.ready.then(() => {
                clearTimeout(fontLoadTimeout);
                markFontsLoaded();
            }).catch(() => {
                clearTimeout(fontLoadTimeout);
                markFontsLoaded();
            });
        }

        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: '#1392ec',
                        secondary: '#0047AB',
                        background: {
                            light: '#f6f7f8',
                            dark: '#101a22'
                        }
                    },
                    fontFamily: {
                        sans: ['Lexend', 'sans-serif'],
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-[#f6f7f8] dark:bg-[#101a22] text-[#111518] dark:text-gray-100">
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
</body>
</html>
